<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Job Skills Management" />
    <meta name="author" content="Tim Kent" />
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="icon" href="images/ci-logo.png" />
    <title>Job Skills (CIQMS)</title>
  </head>
  <body>
    <header id="header"></header>
    <div class="recordsaddrecordheading">
      <h1>Job Skills</h1>
      <button
        class="addrecordheadingbutton button"
        id="addJobSkillBtn"
        title="Add Job Skill"
      >
        +
      </button>
    </div>

    <main id="main">
      <!-- Add Job Skill Dialog -->
      <dialog id="addJobSkillDialog" class="dialog">
        <div class="dialog-header">
          <h2>Assign Skill to Job</h2>
        </div>
        <form id="jobSkillForm" class="form">
          <div class="form-grid">
            <div class="form-group">
              <label for="jobTitle" class="required">Job Title</label>
              <input
                type="text"
                id="jobTitle"
                name="jobTitle"
                required
                placeholder="Enter job title"
              />
            </div>

            <div class="form-group">
              <label for="skillId" class="required">Skill</label>
              <select id="skillId" name="skillId" required>
                <option value="">-- Select Skill --</option>
              </select>
            </div>

            <div class="form-group">
              <label for="requiredLevel">Required Level</label>
              <select id="requiredLevel" name="requiredLevel">
                <option value="">-- Optional --</option>
                <option value="Basic">Basic</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Advanced">Advanced</option>
                <option value="Expert">Expert</option>
              </select>
            </div>
          </div>

          <div class="dialog-footer">
            <button
              type="button"
              id="cancelJobSkillDialog"
              class="button secondary"
            >
              Cancel
            </button>
            <button type="submit" class="button primary">Assign Skill</button>
          </div>
        </form>
      </dialog>

      <!-- Job Skills Table -->
      <div id="jobSkillsContainer" class="table-container">
        <!-- Table will be generated here -->
      </div>
    </main>

    <footer id="footer"></footer>
  </body>
  <script type="module" src="/js/ctajobskills.mjs"></script>
</html>
