<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products</title>
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      body {
        display: flex;
        flex-direction: column;
        font-size: 13px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }

      header {
        flex-shrink: 0;
      }

      nav {
        flex-shrink: 0;
      }

      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        background: #f8f9fa;
        border-bottom: 1px solid #ddd;
        flex-shrink: 0;
        gap: 10px;
      }

      .page-header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 0 0 auto;
      }

      .btn-sm {
        padding: 6px 12px;
        font-size: 12px;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-weight: 600;
        white-space: nowrap;
        transition: all 0.15s;
      }

      .btn-primary {
        background-color: #007bff;
        color: white;
      }

      .btn-primary:hover {
        background-color: #0056b3;
      }

      main {
        flex: 1;
        overflow: auto;
        border-top: 1px solid #ddd;
      }

      .empty-message {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #999;
        font-size: 13px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      thead {
        background: #f5f5f5;
        border-bottom: 2px solid #ddd;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      th {
        padding: 8px;
        text-align: left;
        font-weight: 600;
        color: #333;
        border-right: 1px solid #ddd;
      }

      th:last-child {
        border-right: none;
      }

      td {
        padding: 7px 8px;
        border-bottom: 1px solid #eee;
        border-right: 1px solid #eee;
      }

      td:last-child {
        border-right: none;
      }

      tbody tr:hover {
        background-color: #f9f9f9;
      }

      .badge {
        display: inline-block;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 11px;
        font-weight: 600;
      }

      .badge-id {
        background: #e7f3ff;
        color: #0056b3;
      }

      .badge-ok {
        background: #d4edda;
        color: #155724;
      }

      .badge-no {
        background: #f8d7da;
        color: #721c24;
      }

      /* Modal styles */
      .modal-backdrop {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 999;
      }

      .modal-backdrop.open {
        display: block;
      }

      .modal {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 95%;
        max-width: 500px;
        background: white;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        z-index: 1000;
        flex-direction: column;
        max-height: 90vh;
        overflow: hidden;
      }

      .modal.open {
        display: flex;
      }

      .modal-header {
        padding: 12px 14px;
        border-bottom: 1px solid #eee;
        font-size: 14px;
        font-weight: 700;
        color: #333;
        flex-shrink: 0;
      }

      .modal-body {
        flex: 1;
        overflow-y: auto;
        padding: 12px 14px;
      }

      .modal-footer {
        padding: 10px 14px;
        border-top: 1px solid #eee;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        flex-shrink: 0;
        background: #f8f9fa;
      }

      .btn-primary {
        padding: 6px 12px;
        font-size: 12px;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-weight: 600;
        background: #007bff;
        color: white;
      }

      .btn-primary:hover {
        background: #0056b3;
      }

      .btn-secondary {
        padding: 6px 12px;
        font-size: 12px;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-weight: 600;
        background: #6c757d;
        color: white;
      }

      .btn-secondary:hover {
        background: #5a6268;
      }

      .form-group {
        margin-bottom: 12px;
      }

      .form-group label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        color: #666;
        margin-bottom: 4px;
        text-transform: uppercase;
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 6px 8px;
        font-size: 12px;
        border: 1px solid #ccc;
        border-radius: 3px;
        font-family: inherit;
      }

      .form-group textarea {
        resize: vertical;
        min-height: 80px;
      }

      .error-message {
        display: none;
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
        padding: 8px;
        border-radius: 3px;
        margin-bottom: 12px;
        font-size: 12px;
      }

      .error-message.show {
        display: block;
      }
    </style>
  </head>
  <body>
    <header id="header"></header>

    <div class="page-header">
      <h1>Products</h1>
      <div class="toolbar">
        <button class="btn-sm btn-primary" id="btnAdd">+ Add</button>
      </div>
    </div>

    <main id="listContainer">
      <div class="empty-message">Loading products...</div>
    </main>

    <!-- Add Product Modal -->
    <div class="modal-backdrop" id="backdrop"></div>
    <div class="modal" id="modal">
      <div class="modal-header">Add Product</div>
      <div class="modal-body">
        <div id="errorMessage" class="error-message"></div>
        <form id="form" style="display: contents">
          <div class="form-group">
            <label>Product ID <span style="color: #d32f2f">*</span></label>
            <input type="text" id="PRODUCT_ID" required maxlength="30" />
          </div>
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="NAME" maxlength="40" />
          </div>
          <div class="form-group">
            <label>Status</label>
            <select
              id="STATUS"
              style="
                width: 100%;
                padding: 6px 8px;
                font-size: 12px;
                border: 1px solid #ccc;
                border-radius: 3px;
              "
            >
              <option value="C">C - Current</option>
              <option value="O">O - Obsolete</option>
              <option value="D">D - Development</option>
            </select>
          </div>
          <div class="form-group">
            <label>Type</label>
            <input type="text" id="PRODUCT_TYPE" maxlength="16" />
          </div>
          <div class="form-group">
            <label>Revision Level</label>
            <input type="text" id="REVISION_LEVEL" maxlength="8" />
          </div>
          <div class="form-group">
            <label>Drawing Number</label>
            <input type="text" id="DRAWING_NUMBER" maxlength="16" />
          </div>
          <div class="form-group">
            <label>Reference</label>
            <input type="text" id="REFERENCE" maxlength="24" />
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button id="btnCancel" class="btn-secondary">Cancel</button>
        <button id="btnSave" class="btn-primary">Save</button>
      </div>
    </div>

    <script type="module">
      import * as products from "./js/products.mjs";
      products.initializeProducts();
      products.setupEventListeners();
    </script>
  </body>
</html>
