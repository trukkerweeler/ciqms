<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>XCert Query</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/xcert.css" />
  </head>
  <body>
    <h1>XCert Workorder Lookup</h1>

    <!-- Step 1: Inventory History Query -->
    <div class="inventory-section">
      <h2>Step 1: Select Inventory Transactions</h2>
      <form id="inventory-form">
        <label for="job">Job Number:</label>
        <input
          type="text"
          id="job"
          name="job"
          pattern="\d+"
          value="122473"
          required
        />

        <label for="suffix">Suffix (3 digits):</label>
        <input
          type="text"
          id="suffix"
          name="suffix"
          pattern="\d{3}"
          maxlength="3"
          value="000"
          required
        />

        <label for="codeTransaction">Transaction Code:</label>
        <input
          type="text"
          id="codeTransaction"
          name="codeTransaction"
          maxlength="10"
          value="J52"
        />

        <button type="submit">Fetch Inventory Transactions</button>
      </form>

      <div
        id="inventory-working"
        style="display: none; color: blue; font-weight: bold"
      >
        Loading transactions...
      </div>

      <div id="inventory-results"></div>

      <!-- Testing: Operation Filter Toggle -->
      <div
        id="testing-controls"
        style="
          display: none;
          margin-top: 15px;
          padding: 10px;
          background-color: #f0f0f0;
          border-left: 3px solid #999;
        "
      >
        <label style="font-size: 12px; color: #666">
          <input type="checkbox" id="includeAllOps" />
          Include all operations (testing mode)
        </label>
      </div>
    </div>

    <!-- Certificate Results -->
    <div id="cert-results" style="margin-top: 30px"></div>

    <script type="module" src="js/xcert.mjs"></script>
  </body>
</html>
