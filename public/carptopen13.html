<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Open Corrective Action Trend Report" />
    <meta name="author" content="CI QMS" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Abel&family=Tapestry&display=swap"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="icon" href="images/ci-logo.png" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <title>Open Corrective Action Trend</title>
  </head>
  <body>
    <header id="header"></header>
    <main id="main">
      <div class="recordsaddrecordheading">
        <h1>Open Corrective Action Trend</h1>
      </div>

      <div
        style="
          margin-top: 20px;
          padding: 20px;
          background: #f9f9f9;
          border-radius: 8px;
          border: 1px solid #e0e0e0;
        "
      >
        <div style="position: relative; height: 400px">
          <canvas id="openCAChart"></canvas>
        </div>
        <p style="margin-top: 20px; color: #666; font-size: 0.9em">
          This trend shows the count of open corrective actions as of the last
          day of each month over the last 13 months.
        </p>
      </div>
    </main>
    <footer id="footer"></footer>
  </body>
  <script type="module" src="/js/carptopen13.mjs"></script>
</html>
