<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Details</title>
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }

      body {
        display: flex;
        flex-direction: column;
        font-size: 13px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }

      header {
        flex-shrink: 0;
      }

      nav {
        flex-shrink: 0;
      }

      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        background: #f8f9fa;
        border-bottom: 1px solid #ddd;
        flex-shrink: 0;
        gap: 10px;
      }

      .page-header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
      }

      .page-header a {
        color: #007bff;
        text-decoration: none;
        font-size: 12px;
        font-weight: 600;
      }

      .page-header a:hover {
        text-decoration: underline;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 0 0 auto;
      }

      .btn-sm {
        padding: 6px 12px;
        font-size: 12px;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-weight: 600;
        white-space: nowrap;
        transition: all 0.15s;
      }

      .btn-primary {
        background-color: #007bff;
        color: white;
      }

      .btn-primary:hover {
        background-color: #0056b3;
      }

      .btn-secondary {
        background-color: #6c757d;
        color: white;
      }

      .btn-secondary:hover {
        background-color: #5a6268;
      }

      main {
        flex: 1;
        overflow: auto;
        display: flex;
        flex-direction: column;
      }

      .content {
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 16px;
      }

      .details-section {
        background: white;
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 14px;
      }

      .section-title {
        font-size: 11px;
        font-weight: 700;
        color: #555;
        margin: 0 0 10px 0;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        border-bottom: 1px solid #e0e0e0;
        padding-bottom: 6px;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 12px;
      }

      .detail-field {
        display: flex;
        flex-direction: column;
      }

      .detail-label {
        font-size: 11px;
        font-weight: 700;
        color: #666;
        text-transform: uppercase;
        margin-bottom: 2px;
        letter-spacing: 0.3px;
      }

      .detail-value {
        font-size: 13px;
        color: #333;
        padding: 6px 0;
        word-break: break-word;
      }

      .detail-value.empty {
        color: #999;
        font-style: italic;
      }

      .badge {
        display: inline-block;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 11px;
        font-weight: 600;
        width: fit-content;
      }

      .badge-ok {
        background: #d4edda;
        color: #155724;
      }

      .badge-no {
        background: #f8d7da;
        color: #721c24;
      }

      .characteristics-section {
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1;
      }

      .characteristics-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .product-info-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .product-info-header h3 {
        margin: 0;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        color: #555;
        letter-spacing: 0.3px;
        border-bottom: 1px solid #e0e0e0;
        padding-bottom: 6px;
        flex: 1;
        text-align: left;
      }

      .characteristics-header h3 {
        margin: 0;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        color: #555;
        letter-spacing: 0.3px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
        flex: 1;
      }

      thead {
        background: #f5f5f5;
        border-bottom: 2px solid #ddd;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      table thead tr {
        background-color: #f5f5f5;
        color: #333;
      }

      th {
        padding: 8px;
        text-align: left;
        font-weight: 600;
        color: #333;
        border-right: 1px solid #ddd;
      }

      th:last-child {
        border-right: none;
      }

      /* Narrow columns */
      th:nth-child(1),
      th:nth-child(5),
      th:nth-child(6),
      th:nth-child(7) {
        width: 70px;
        padding: 8px 4px;
      }

      td:nth-child(1),
      td:nth-child(5),
      td:nth-child(6),
      td:nth-child(7) {
        width: 70px;
        padding: 7px 4px;
        text-align: center;
        font-size: 11px;
      }

      td {
        padding: 7px 8px;
        border-bottom: 1px solid #eee;
        border-right: 1px solid #eee;
      }

      td:last-child {
        border-right: none;
      }

      tbody tr:hover {
        background-color: #f9f9f9;
      }

      .badge-char {
        background: #e7f3ff;
        color: #0056b3;
      }

      .empty-message {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 150px;
        color: #999;
        font-size: 13px;
        text-align: center;
      }

      .loading {
        text-align: center;
        color: #999;
        padding: 20px;
      }

      @media (max-width: 600px) {
        .detail-grid {
          grid-template-columns: 1fr;
        }

        .content {
          padding: 12px;
          gap: 12px;
        }

        .details-section {
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <header id="header"></header>

    <div class="page-header">
      <h1 id="pageTitle">Product Details</h1>
      <a
        href="products.html"
        style="
          color: #007bff;
          text-decoration: none;
          font-size: 12px;
          font-weight: 600;
        "
        >← Back</a
      >
    </div>

    <main id="mainContent">
      <div class="content">
        <div id="detailsContainer" class="details-section loading">
          Loading product details...
        </div>

        <div class="details-section characteristics-section">
          <div class="characteristics-header">
            <h3>Characteristics</h3>
            <button class="btn-sm btn-primary" id="btnAddChar">+ Add</button>
          </div>
          <div id="charContainer">
            <div class="empty-message">
              No characteristics found. Click "+ Add Characteristic" to create
              one.
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Edit Product Modal -->
    <div class="modal-backdrop" id="editBackdrop"></div>
    <div class="modal" id="editModal">
      <div class="modal-header">Edit Product</div>
      <div class="modal-body">
        <form id="editForm" style="display: contents">
          <div id="editErrorBox" class="error-box"></div>

          <div class="grid-2">
            <div class="form-group">
              <label>Product ID <span class="req">*</span></label>
              <input type="text" id="editPRODUCT_ID" required readonly />
            </div>
            <div class="form-group">
              <label>Status <span class="req">*</span></label>
              <select id="editSTATUS" required>
                <option value="C">C - Current</option>
                <option value="O">O - Obsolete</option>
                <option value="D">D - Development</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Name</label>
            <input type="text" id="editNAME" maxlength="40" />
          </div>

          <div class="form-group">
            <label>Type</label>
            <input type="text" id="editPRODUCT_TYPE" maxlength="16" />
          </div>

          <div class="form-group">
            <label>Revision Level</label>
            <input type="text" id="editREVISION_LEVEL" maxlength="8" />
          </div>

          <div class="form-group">
            <label>Drawing Number</label>
            <input type="text" id="editDRAWING_NUMBER" maxlength="16" />
          </div>

          <div class="form-group">
            <label>Reference</label>
            <input type="text" id="editREFERENCE" maxlength="24" />
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button id="editBtnCancel" class="btn-secondary">Cancel</button>
        <button id="editBtnSave" class="btn-primary">Save</button>
      </div>
    </div>

    <!-- Add Characteristic Modal -->
    <div class="modal-backdrop" id="backdrop"></div>
    <div class="modal" id="modal">
      <div class="modal-header">Add Product Characteristic</div>
      <div class="modal-body">
        <form id="form" style="display: contents">
          <div id="errorBox" class="error-box"></div>

          <div class="grid-2">
            <div class="form-group">
              <label>Product ID <span class="req">*</span></label>
              <input type="text" id="PRODUCT_ID" required readonly />
            </div>
            <div class="form-group">
              <label>Revision <span class="req">*</span></label>
              <input type="text" id="REVISION_LEVEL" maxlength="4" required />
            </div>
          </div>

          <div class="section-title">Specification</div>
          <div class="grid-3">
            <div class="form-group">
              <label>Nominal</label>
              <input type="number" id="NOMINAL" step="0.000001" />
            </div>
            <div class="form-group">
              <label>Lower</label>
              <input type="number" id="LOWER" step="0.000001" />
            </div>
            <div class="form-group">
              <label>Upper</label>
              <input type="number" id="UPPER" step="0.000001" />
            </div>
          </div>

          <div class="form-group">
            <label>Name</label>
            <input type="text" id="NAME" maxlength="60" />
          </div>

          <div class="form-group">
            <label>Type</label>
            <input type="text" id="TYPE" maxlength="16" />
          </div>

          <div class="form-group">
            <label>Units</label>
            <input type="text" id="UNITS" maxlength="16" />
          </div>

          <div class="form-group">
            <label>Sig Digits</label>
            <input type="number" id="SIGNIFICAT_DIGITS" min="0" step="1" />
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button id="btnCancel" class="btn-secondary">Cancel</button>
        <button id="btnSave" class="btn-primary">Save</button>
      </div>
    </div>

    <!-- Edit Characteristic Modal -->
    <div class="modal-backdrop" id="editCharBackdrop"></div>
    <div class="modal" id="editCharModal">
      <div class="modal-header">Edit Product Characteristic</div>
      <div class="modal-body">
        <form id="editCharForm" style="display: contents">
          <div id="editCharErrorBox" class="error-box"></div>

          <div class="grid-2">
            <div class="form-group">
              <label>Product ID <span class="req">*</span></label>
              <input type="text" id="editCharPRODUCT_ID" required readonly />
            </div>
            <div class="form-group">
              <label>Char No <span class="req">*</span></label>
              <input type="text" id="editCharCHAR_NO" required readonly />
            </div>
          </div>

          <div class="grid-2">
            <div class="form-group">
              <label>Revision <span class="req">*</span></label>
              <input
                type="text"
                id="editCharREVISION_LEVEL"
                maxlength="4"
                required
              />
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="editCharSTATUS">
                <option value="A">A - Active</option>
                <option value="I">I - Inactive</option>
              </select>
            </div>
          </div>

          <div class="section-title">Specification</div>
          <div class="grid-3">
            <div class="form-group">
              <label>Nominal</label>
              <input type="number" id="editCharNOMINAL" step="0.000001" />
            </div>
            <div class="form-group">
              <label>Lower</label>
              <input type="number" id="editCharLOWER" step="0.000001" />
            </div>
            <div class="form-group">
              <label>Upper</label>
              <input type="number" id="editCharUPPER" step="0.000001" />
            </div>
          </div>

          <div class="form-group">
            <label>Name</label>
            <input type="text" id="editCharNAME" maxlength="60" />
          </div>

          <div class="form-group">
            <label>Type</label>
            <input type="text" id="editCharTYPE" maxlength="16" />
          </div>

          <div class="form-group">
            <label>Units</label>
            <input type="text" id="editCharUNITS" maxlength="16" />
          </div>

          <div class="form-group">
            <label>Sig Digits</label>
            <input
              type="number"
              id="editCharSIGNIFICAT_DIGITS"
              min="0"
              step="1"
            />
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button id="editCharBtnCancel" class="btn-secondary">Cancel</button>
        <button id="editCharBtnSave" class="btn-primary">Save</button>
      </div>
    </div>

    <style>
      .form-group {
        margin-bottom: 12px;
      }

      .form-group label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        color: #666;
        margin-bottom: 4px;
        text-transform: uppercase;
      }

      .form-group input,
      .form-group select {
        width: 100%;
        padding: 6px 8px;
        font-size: 12px;
        border: 1px solid #ccc;
        border-radius: 3px;
        font-family: inherit;
        background: white;
      }

      .form-group input:readonly {
        background: #f5f5f5;
        color: #666;
        cursor: not-allowed;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .grid-3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .section-title {
        font-size: 11px;
        font-weight: 700;
        color: #555;
        margin: 10px 0 4px 0;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        border-bottom: 1px solid #e0e0e0;
        padding-bottom: 3px;
      }

      .error-box {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
        padding: 8px;
        border-radius: 3px;
        margin: 0 0 8px 0;
        font-size: 12px;
        display: none;
      }

      .error-box.show {
        display: block;
      }

      /* Modal */
      .modal-backdrop {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 999;
      }

      .modal-backdrop.open {
        display: block;
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 95%;
        max-width: 680px;
        max-height: 98vh;
        background: white;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        z-index: 1000;
        margin-top: 20px;
        flex-direction: column;
      }

      .modal.open {
        display: flex;
      }

      .modal-header {
        padding: 12px 14px;
        border-bottom: 1px solid #eee;
        font-size: 14px;
        font-weight: 700;
        color: #333;
        flex-shrink: 0;
      }

      .modal-body {
        flex: 1;
        overflow-y: auto;
        padding: 12px 14px;
      }

      .modal-footer {
        padding: 10px 14px;
        border-top: 1px solid #eee;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        flex-shrink: 0;
        background: #f8f9fa;
      }

      .req {
        color: #d32f2f;
      }

      @media (max-width: 600px) {
        .grid-2,
        .grid-3 {
          grid-template-columns: 1fr;
        }

        .modal {
          width: 100%;
          margin-top: 0;
          max-height: 100vh;
          border-radius: 0;
        }
      }
    </style>

    <script type="module">
      import * as productDetail from "./js/product-detail.mjs";
      productDetail.initialize();
    </script>
  </body>
</html>
