<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="js node test page." />
    <meta name="author" content="This page authored by timokent" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Abel&family=Tapestry&display=swap"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <title>Competency (CI QMS)</title>
    <style>
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      #main {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding-bottom: 50px; /* clear fixed footer */
      }
      #trainingTableContainer {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
      }

      /* File drop zone */
      .file-drop-zone {
        border: 2px dashed #ced4da;
        border-radius: 6px;
        padding: 0.75rem 1rem;
        text-align: center;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        background: #f8f9fa;
        color: #6c757d;
        font-size: 0.88rem;
      }
      .file-drop-zone:hover,
      .file-drop-zone.drag-over {
        border-color: #a91730;
        background: rgba(169, 23, 48, 0.05);
        color: #a91730;
      }
      .file-drop-link {
        text-decoration: underline;
        color: #a91730;
      }
      .file-drop-preview {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.35rem 0.6rem;
        background: #e8f5e9;
        border: 1px solid #a5d6a7;
        border-radius: 6px;
        margin-top: 0.25rem;
        font-size: 0.85rem;
        color: #2e7d32;
        word-break: break-all;
      }
      .file-clear-btn {
        background: none !important;
        border: none !important;
        color: #c62828 !important;
        cursor: pointer !important;
        font-size: 1rem !important;
        padding: 0 0.25rem !important;
        height: auto !important;
        line-height: 1 !important;
        margin-left: auto !important;
        flex-shrink: 0;
      }
      .archive-label {
        display: flex !important;
        align-items: center !important;
        gap: 0.4rem !important;
        margin-top: 0.4rem !important;
        font-weight: normal !important;
        text-transform: none !important;
        letter-spacing: 0 !important;
        cursor: pointer !important;
        font-size: 0.82rem !important;
        color: #495057 !important;
      }
      .archive-label input[type="checkbox"] {
        margin: 0 !important;
        width: auto !important;
        padding: 0 !important;
        font-size: inherit !important;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <header id="header"></header>
    <div class="recordsaddrecordheading">
      <h1>Training Records</h1>
      <button
        class="addrecordheadingbutton button"
        id="addTrainingBtn"
        title="Add new Training Record"
      >
        +
      </button>
    </div>

    <div
      id="employeeFilter"
      style="margin: 1rem 0; display: flex; align-items: center; gap: 0.5rem"
    >
      <label for="employeeIdFilter">Filter by Employee ID:</label>
      <input
        type="text"
        id="employeeIdFilter"
        placeholder="Enter employee ID"
        style="padding: 0.5rem; text-transform: uppercase"
      />
      <button id="clearFilterBtn" class="btn" style="padding: 0.5rem 1rem">
        Clear
      </button>
    </div>

    <main id="main">
      <!-- Add Training Record Dialog -->
      <dialog id="addTrainingDialog" class="dialog">
        <form id="addTrainingForm" class="form">
          <div class="form-header">
            <h2>Add Training Record</h2>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label for="COURSE_ID"
                >Course ID <span class="required">*</span></label
              >
              <input
                type="text"
                id="COURSE_ID"
                name="COURSE_ID"
                placeholder="Enter course ID"
                required
              />
            </div>

            <div class="form-group">
              <label for="DATE_TIME"
                >Date <span class="required">*</span></label
              >
              <input type="date" id="DATE_TIME" name="DATE_TIME" required />
            </div>

            <div class="form-group">
              <label for="PEOPLE_ID">
                Attendees (Person IDs, comma or newline separated)
                <span class="required">*</span>
              </label>
              <textarea
                id="PEOPLE_ID"
                name="PEOPLE_ID"
                placeholder="Enter one or more person IDs"
                style="text-transform: uppercase"
                rows="3"
                required
              ></textarea>
            </div>

            <div class="form-group">
              <label for="INSTRUCTOR">Instructor</label>
              <input
                type="text"
                id="INSTRUCTOR"
                name="INSTRUCTOR"
                placeholder="Enter instructor ID"
                style="text-transform: uppercase"
              />
            </div>

            <div class="form-group">
              <label for="MINUTES"
                >Duration (minutes) <span class="required">*</span></label
              >
              <input
                type="number"
                id="MINUTES"
                name="MINUTES"
                placeholder="Enter duration"
                min="1"
                step="1"
                required
              />
            </div>

            <div class="form-group full-width">
              <label>Training Document</label>
              <div id="fileDrop" class="file-drop-zone">
                Drop file here, or
                <span class="file-drop-link">click to browse</span>
                <input
                  type="file"
                  id="fileBrowse"
                  tabindex="-1"
                  style="display: none"
                />
                <input type="hidden" id="LINK" name="LINK" />
              </div>
              <div
                id="fileDropPreview"
                class="file-drop-preview"
                style="display: none"
              >
                <span id="fileDropName"></span>
                <button
                  type="button"
                  id="clearFileBtn"
                  class="file-clear-btn"
                  title="Remove file"
                >
                  ✕
                </button>
              </div>
              <label
                class="archive-label"
                title="Move the file from _to-enter to _entered after saving"
              >
                <input type="checkbox" id="moveFileCheck" />
                Archive file after saving
                <em style="color: #888">(_to-enter → _entered)</em>
              </label>
            </div>
          </div>

          <div class="dialog-actions">
            <button id="saveTrainingBtn" type="submit" class="btn btn-primary">
              <span class="btn-icon">✓</span>
              Save Training
            </button>
            <button type="button" id="closeAddBtn" class="btn btn-cancel">
              <span class="btn-icon">✕</span>
              Cancel
            </button>
          </div>
        </form>
      </dialog>

      <!-- Table container for training data -->
      <div id="trainingTableContainer" class="table-container">
        <!-- Table will be dynamically generated here -->
      </div>
    </main>
    <footer id="footer"></footer>
  </body>
  <script type="module" src="/js/ctaattend.mjs"></script>
</html>
