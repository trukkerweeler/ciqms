<!doctype html>
<html lang="en" style="height: 100%; margin: 0; padding: 0">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inspection Plan Details</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/inspplans.css" />
    <link rel="icon" href="./images/ci-logo.png" />
    <style>
      body {
        display: flex;
        flex-direction: column;
        height: 100%;
        margin: 0;
        padding: 0;
      }
      header {
        flex-shrink: 0;
      }
      nav {
        flex-shrink: 0;
      }
      #main-content {
        display: flex;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
      }
      .detail-section {
        display: flex;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
      }
      .detail-header {
        flex-shrink: 0;
        padding: 12px 16px;
        background: #f8f9fa;
        border-bottom: 1px solid #ddd;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .detail-header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
        flex: 1;
      }
      .detail-header .btn {
        padding: 6px 12px;
        font-size: 12px;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-weight: 600;
      }
      .btn-back {
        background-color: #6c757d;
        color: white;
      }
      .btn-back:hover {
        background-color: #5a6268;
      }
      .btn-delete {
        background-color: #dc3545;
        color: white;
      }
      .btn-delete:hover {
        background-color: #c82333;
      }
      .detail-container {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }
      .plan-info {
        background: white;
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .info-row {
        display: grid;
        grid-template-columns: 150px 1fr;
        gap: 12px;
        margin-bottom: 12px;
        font-size: 13px;
      }
      .info-row:last-child {
        margin-bottom: 0;
      }
      .info-label {
        font-weight: 600;
        color: #333;
      }
      .info-value {
        color: #666;
      }
      .characteristics-section {
        background: white;
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 16px;
      }
      .characteristics-section h2 {
        margin: 0 0 12px 0;
        font-size: 16px;
        font-weight: 600;
      }
      .characteristics-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      .characteristics-table thead {
        background: #2c3e50;
        color: white;
      }
      .characteristics-table th {
        padding: 8px 12px;
        text-align: left;
        font-weight: 600;
        border-bottom: 2px solid #1a252f;
      }
      .characteristics-table td {
        padding: 8px 12px;
        border-bottom: 1px solid #eee;
      }
      .characteristics-table tbody tr:hover {
        background: #f0f0f0;
      }
      .empty-message {
        padding: 20px;
        text-align: center;
        color: #999;
        font-size: 13px;
      }
      .btn-small {
        padding: 4px 8px;
        font-size: 11px;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-weight: 600;
      }
      .btn-remove {
        background-color: #dc3545;
        color: white;
      }
      .btn-remove:hover {
        background-color: #c82333;
      }
    </style>
  </head>
  <body>
    <header id="header"></header>
    <nav></nav>
    <main id="main-content">
      <section class="detail-section">
        <div class="detail-header">
          <h1>Plan Details</h1>
          <button class="btn btn-back" onclick="goBack()">← Back</button>
          <button class="btn btn-delete" onclick="deletePlan()">
            Delete Plan
          </button>
        </div>

        <div class="detail-container" id="detail-container">
          <div class="plan-info" id="plan-info"></div>
          <div class="characteristics-section">
            <h2>Characteristics</h2>
            <table class="characteristics-table">
              <thead>
                <tr>
                  <th>Characteristic No</th>
                  <th>Characteristic Name</th>
                  <th>Sample Size</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="characteristics-body">
                <tr>
                  <td colspan="4" class="empty-message">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
    <footer id="footer"></footer>
  </body>
  <script type="module" src="js/inspplan-detail.mjs"></script>
</html>
