<!doctype html>
<html lang="en" style="height: 100%; margin: 0; padding: 0">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collects</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/collects.css" />
    <link rel="icon" href="./images/ci-logo.png" />
  </head>
  <body>
    <header id="header"></header>
    <nav></nav>
    <main id="main-content">
      <section class="section">
        <div class="page-header-div">
          <h1 class="page-header">Product Collection</h1>
          <div id="column-controls"></div>
        </div>

        <div id="prod-plan-container"></div>
      </section>
      <dialog create-product-plan-dialog class="dialog">
        <form id="create-product-plan-form">
          <h2 id="create-plan-header">Create Collect</h2>

          <label for="product-id">Product ID:</label>
          <input type="text" id="product-id" name="PRODUCT_ID" required />

          <label for="product-rev-level">Product Rev Level:</label>
          <input
            type="text"
            id="product-rev-level"
            name="PRODUCT_REV_LEVEL"
            required
          />

          <label for="operation-no">Operation No:</label>
          <input type="text" id="operation-no" name="OPERATION_NO" required />

          <label for="collection-date">Collection Date:</label>
          <input
            type="date"
            id="collection-date"
            name="COLLECTION_DATE"
            required
          />

          <label for="po-number">PO Number:</label>
          <input type="text" id="po-number" name="PO_NUMBER" />

          <label for="lot-number">Lot Number:</label>
          <input type="text" id="lot-number" name="LOT_NUMBER" />

          <label for="lot-size">Lot Size:</label>
          <input type="number" id="lot-size" name="LOT_SIZE" />

          <label for="assigned-to">Assigned To:</label>
          <input type="text" id="assigned-to" name="ASSIGNED_TO" />

          <label for="due-date">Due Date:</label>
          <input type="date" id="due-date" name="DUE_DATE" />

          <label for="accepted">Accepted:</label>
          <input type="number" id="accepted" name="ACCEPTED" />

          <label for="rejected">Rejected:</label>
          <input type="number" id="rejected" name="REJECTED" />

          <label for="ncm-id">NCM ID:</label>
          <input type="text" id="ncm-id" name="NCM_ID" />

          <div class="dialog-actions">
            <button
              id="buttonAddProductPlan"
              class="btn btn-primary"
              type="submit"
            >
              Create
            </button>
            <button
              type="button"
              id="cancel-add-product-plan"
              class="btn btn-cancel"
            >
              Cancel
            </button>
          </div>
        </form>
      </dialog>
    </main>
    <footer id="footer"></footer>
  </body>
  <script type="module" src="js/collects.mjs"></script>
</html>
