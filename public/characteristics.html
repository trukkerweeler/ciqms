<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Characteristics</title>
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }

      body {
        display: flex;
        flex-direction: column;
        font-size: 13px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }

      header {
        flex-shrink: 0;
      }

      nav {
        flex-shrink: 0;
      }

      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        background: #f8f9fa;
        border-bottom: 1px solid #ddd;
        flex-shrink: 0;
        gap: 10px;
      }

      .page-header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 0 0 auto;
      }

      .toolbar input {
        padding: 6px 8px;
        font-size: 12px;
        border: 1px solid #ccc;
        border-radius: 3px;
        width: 160px;
        background: white;
      }

      .btn-sm {
        padding: 6px 12px;
        font-size: 12px;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-weight: 600;
        white-space: nowrap;
        transition: all 0.15s;
      }

      .btn-primary {
        background-color: #007bff;
        color: white;
      }

      .btn-primary:hover {
        background-color: #0056b3;
      }

      .btn-success {
        background-color: #28a745;
        color: white;
        margin-left: auto;
      }

      .btn-success:hover {
        background-color: #218838;
      }

      main {
        flex: 1;
        overflow: auto;
        border-top: 1px solid #ddd;
      }

      .empty-message {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #999;
        font-size: 13px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      thead {
        background: #f5f5f5;
        border-bottom: 2px solid #ddd;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      th {
        padding: 8px;
        text-align: left;
        font-weight: 600;
        color: #333;
        border-right: 1px solid #ddd;
      }

      th:last-child {
        border-right: none;
      }

      td {
        padding: 7px 8px;
        border-bottom: 1px solid #eee;
        border-right: 1px solid #eee;
      }

      td:last-child {
        border-right: none;
      }

      tbody tr:hover {
        background-color: #f9f9f9;
      }

      .badge {
        display: inline-block;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 11px;
        font-weight: 600;
      }

      .badge-char {
        background: #e7f3ff;
        color: #0056b3;
      }

      .badge-ok {
        background: #d4edda;
        color: #155724;
      }

      .badge-no {
        background: #f8d7da;
        color: #721c24;
      }

      /* Modal */
      .modal-backdrop {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 999;
      }

      .modal-backdrop.open {
        display: block;
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 95%;
        max-width: 680px;
        max-height: 98vh;
        background: white;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        z-index: 1000;
        margin-top: 20px;
        flex-direction: column;
      }

      .modal.open {
        display: flex;
      }

      .modal-header {
        padding: 12px 14px;
        border-bottom: 1px solid #eee;
        font-size: 14px;
        font-weight: 700;
        color: #333;
        flex-shrink: 0;
      }

      .modal-body {
        flex: 1;
        overflow-y: auto;
        padding: 12px 14px;
      }

      .modal-footer {
        padding: 10px 14px;
        border-top: 1px solid #eee;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        flex-shrink: 0;
        background: #f8f9fa;
      }

      .error-box {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
        padding: 8px;
        border-radius: 3px;
        margin: 0 0 8px 0;
        font-size: 12px;
        display: none;
      }

      .error-box.show {
        display: block;
      }

      .form-group {
        margin-bottom: 8px;
      }

      label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        color: #666;
        margin-bottom: 2px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }

      label .req {
        color: #d32f2f;
      }

      input,
      select {
        width: 100%;
        padding: 5px 6px;
        font-size: 12px;
        border: 1px solid #ccc;
        border-radius: 3px;
        font-family: inherit;
        background: white;
        color: #333;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: #007bff;
        box-shadow: inset 0 0 0 1px #007bff;
      }

      input[readonly] {
        background: #f5f5f5;
        color: #666;
        cursor: not-allowed;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .grid-3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .section-title {
        font-size: 11px;
        font-weight: 700;
        color: #555;
        margin: 10px 0 4px 0;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        border-bottom: 1px solid #e0e0e0;
        padding-bottom: 3px;
      }

      @media (max-width: 600px) {
        .grid-2,
        .grid-3 {
          grid-template-columns: 1fr;
        }

        .toolbar {
          flex-wrap: wrap;
          width: 100%;
        }

        .toolbar input {
          flex: 1;
          min-width: 120px;
        }

        .btn-success {
          margin-left: 0;
        }

        .modal {
          width: 100%;
          margin-top: 0;
          max-height: 100vh;
          border-radius: 0;
        }
      }
    </style>
  </head>
  <body>
    <header id="header"></header>

    <div class="page-header">
      <h1 id="pageTitle">Product Characteristics</h1>
      <div class="toolbar">
        <button class="btn-sm btn-success" id="btnAdd">+ Add</button>
      </div>
    </div>

    <main id="listContainer">
      <div class="empty-message">
        Enter a Product ID to view characteristics
      </div>
    </main>

    <!-- Modal -->
    <div class="modal-backdrop" id="backdrop"></div>
    <div class="modal" id="modal">
      <div class="modal-header">Add Product Characteristic</div>
      <div class="modal-body">
        <form id="form" style="display: contents">
          <div id="errorBox" class="error-box"></div>

          <div class="grid-2">
            <div class="form-group">
              <label>Product ID <span class="req">*</span></label>
              <input type="text" id="PRODUCT_ID" required />
            </div>
            <div class="form-group">
              <label>Revision <span class="req">*</span></label>
              <input type="text" id="REVISION_LEVEL" maxlength="4" required />
            </div>
          </div>

          <div class="section-title">Specification</div>
          <div class="grid-3">
            <div class="form-group">
              <label>Nominal</label>
              <input type="number" id="NOMINAL" step="0.000001" />
            </div>
            <div class="form-group">
              <label>Lower</label>
              <input type="number" id="LOWER" step="0.000001" />
            </div>
            <div class="form-group">
              <label>Upper</label>
              <input type="number" id="UPPER" step="0.000001" />
            </div>
          </div>
          <div class="grid-3">
            <div class="form-group">
              <label>Units</label>
              <input type="text" id="UNITS" maxlength="16" />
            </div>
            <div class="form-group">
              <label>Type</label>
              <input type="text" id="TYPE" maxlength="16" />
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="STATUS">
                <option value="">--</option>
                <option value="A">Active</option>
                <option value="I">Inactive</option>
              </select>
            </div>
          </div>

          <div class="section-title">Drawing & Location</div>
          <div class="grid-2">
            <div class="form-group">
              <label>Name</label>
              <input type="text" id="NAME" maxlength="75" />
            </div>
            <div class="form-group">
              <label>Drawing No</label>
              <input type="text" id="DRAWING_NO" maxlength="40" />
            </div>
          </div>
          <div class="grid-3">
            <div class="form-group">
              <label>Page</label>
              <input type="text" id="PAGE" maxlength="3" />
            </div>
            <div class="form-group">
              <label>Zone</label>
              <input type="text" id="ZONE" maxlength="6" />
            </div>
            <div class="form-group">
              <label>Category</label>
              <input type="text" id="CATEGORY" maxlength="16" />
            </div>
          </div>

          <div class="section-title">Standards</div>
          <div class="grid-3">
            <div class="form-group">
              <label>Std Type</label>
              <input type="text" id="STANDARD_TYPE" maxlength="1" />
            </div>
            <div class="form-group">
              <label>Variable Std</label>
              <input type="text" id="VARIABLE_STANDARD" maxlength="40" />
            </div>
            <div class="form-group">
              <label>Class</label>
              <input type="text" id="CLASS" maxlength="16" />
            </div>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>Sig Digits</label>
              <input type="text" id="SIGNIFICAT_DIGITS" maxlength="6" />
            </div>
            <div class="form-group">
              <label>Issue Date</label>
              <input type="date" id="ISSUE_DATE" />
            </div>
          </div>

          <div class="section-title">Inspection Plan</div>
          <div class="grid-2">
            <div class="form-group">
              <label>Equip Type</label>
              <input type="text" id="INSP_PLAN_EQP_TYPE" maxlength="16" />
            </div>
            <div class="form-group">
              <label>Sample Size</label>
              <input type="number" id="INSP_PLN_SAMP_SIZE" />
            </div>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>Sample Plan</label>
              <input type="text" id="INSP_PLN_SAMP_PLAN" maxlength="3" />
            </div>
            <div class="form-group">
              <label>AQL</label>
              <input type="text" id="INSP_PLAN_AQL" maxlength="4" />
            </div>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>Level</label>
              <input type="text" id="INSP_PLAN_LEVEL" maxlength="16" />
            </div>
            <div class="form-group">
              <label>Frequency</label>
              <input type="text" id="INSP_PLAN_FREQ" maxlength="16" />
            </div>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>Equipment ID</label>
              <input type="text" id="INSP_PLAN_EQUIP_ID" maxlength="16" />
            </div>
            <div class="form-group">
              <label>Device ID</label>
              <input type="text" id="INSP_PLAN_DEV_ID" maxlength="16" />
            </div>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>Device Type</label>
              <input type="text" id="INSP_PLAN_DEV_TYPE" maxlength="16" />
            </div>
            <div class="form-group">
              <label>Chart Type</label>
              <input type="text" id="INSP_PLAN_CHT_TYPE" maxlength="16" />
            </div>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>Measured By</label>
              <input type="text" id="INSP_PLAN_MEAS_BY" maxlength="16" />
            </div>
            <div class="form-group">
              <label>Charted By</label>
              <input type="text" id="INSP_PLAN_CHART_BY" maxlength="16" />
            </div>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>Sample Plan ID</label>
              <input type="text" id="SAMP_PLAN_ID" maxlength="16" />
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button
          class="btn-sm"
          id="btnCancel"
          style="background: #6c757d; color: white"
        >
          Cancel
        </button>
        <button
          class="btn-sm"
          id="btnSave"
          style="background: #007bff; color: white"
        >
          Save
        </button>
      </div>
    </div>

    <script type="module">
      import * as char from "./js/characteristics.mjs";

      const backdrop = document.getElementById("backdrop");
      const errorBox = document.getElementById("errorBox");

      // Modal open/close through module
      document
        .getElementById("btnAdd")
        .addEventListener("click", () => char.openModal());
      document
        .getElementById("btnCancel")
        .addEventListener("click", () => char.closeModal());
      document
        .getElementById("backdrop")
        .addEventListener("click", () => char.closeModal());

      // Form submit
      document
        .getElementById("btnSave")
        .addEventListener("click", async (e) => {
          e.preventDefault();
          await char.saveCharacteristic();
        });

      // Initialize - load characteristics for product from URL parameter
      char.initializeCharacteristics();
    </script>
  </body>
</html>
